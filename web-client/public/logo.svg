    <!-- Bottom Right Cube -->
    <g transform="translate(32, 24)">
      <path d="M0 8 L16 0 L32 8 L16 16 Z" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M0 8 V24 L16 32 V16 Z" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M16 16 V32 L32 24 V8 Z" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linejoin="round"/>
